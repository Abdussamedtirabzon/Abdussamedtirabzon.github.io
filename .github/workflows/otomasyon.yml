name: Kalite Müfettişi

on:
  push:
    branches:
      - main

jobs:
  kalite-kontrol:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Karargahtan Çek
        uses: actions/checkout@v4

      - name: Çalışma Ortamını (Node.js) Hazırla
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Siber Müfettişi (HTMLHint) İndir ve Kur
        run: npm install -g htmlhint

      - name: Kodları Denetle (Gereksiz dosyaları yok sayarak)
        run: htmlhint "**/*.html" --ignore "node_modules/**"